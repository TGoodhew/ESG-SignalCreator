name: Release

# Builds the MSI and publishes a GitHub Release.
#
#  - push to main / manual run  -> a PRERELEASE tagged  v1.0.<run_number>.0  (every update -> a build)
#  - push a tag  v*             -> a STABLE release using that tag
#
# RUNS ON A SELF-HOSTED WINDOWS RUNNER. Since #102 the Core project references only the IVI VISA.NET
# Shared Components (Ivi.Visa) by HintPath — no NI-specific assemblies — so any Windows machine with a
# VISA provider installed (Keysight IO Libraries, NI-VISA, R&S, Rigol, ...) can build it unchanged.
# Register a runner with the labels:  self-hosted, windows  (Settings -> Actions -> Runners -> New
# self-hosted runner). A GitHub-hosted runner can work too if a step installs the IVI VISA.NET Shared
# Components or the reference is switched to the Ivi.Visa NuGet package.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version a.b.c.d (leave blank to auto-derive)'
        required: false

permissions:
  contents: write

jobs:
  build-release:
    runs-on: [ self-hosted, windows ]

    # Run every PowerShell step with an explicit ExecutionPolicy Bypass, so the build works regardless
    # of the machine/service-account execution policy (a service-installed runner defaults to Restricted).
    defaults:
      run:
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Determine version and tag
        id: ver
        run: |
          $input = "${{ github.event.inputs.version }}"
          $ref = "${{ github.ref }}"
          if (-not [string]::IsNullOrWhiteSpace($input)) {
            $version = $input
            $tag = "v$version"
            $prerelease = "false"
          }
          elseif ($ref -like 'refs/tags/v*') {
            $t = $ref -replace 'refs/tags/v',''
            $parts = @($t.Split('.'))
            while ($parts.Count -lt 4) { $parts += '0' }
            $version = ($parts[0..3] -join '.')
            $tag = "v$t"
            $prerelease = "false"
          }
          else {
            $version = "1.0.${{ github.run_number }}.0"
            $tag = "v$version"
            $prerelease = "true"
          }
          "version=$version"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag"             | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "version=$version tag=$tag prerelease=$prerelease"

      - name: Build solution (Release)
        run: msbuild ESG-SignalCreator.sln -t:Restore,Build -p:Configuration=Release -v:minimal -nologo

      - name: Run tests
        run: dotnet vstest ESG-SignalCreator.Tests\bin\Release\ESG-SignalCreator.Tests.dll

      - name: Build MSI (WiX v5)
        run: |
          $harvest = Join-Path $env:GITHUB_WORKSPACE 'ESG-SignalCreator.App\bin\Release'
          # SuppressValidation skips WiX ICE validation, which needs the Windows Installer service —
          # inaccessible to the runner's (service) account. The MSI itself is unaffected.
          dotnet build ESG-SignalCreator.Installer\ESG-SignalCreator.Installer.wixproj -c Release `
            -p:ProductVersion=${{ steps.ver.outputs.version }} -p:HarvestPath=$harvest -p:SuppressValidation=true

      - name: Locate MSI
        id: msi
        run: |
          $msi = Get-ChildItem ESG-SignalCreator.Installer\bin -Recurse -Filter *.msi |
                 Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $msi) { throw 'No MSI produced.' }
          "path=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $sha = [BitConverter]::ToString([Security.Cryptography.SHA256]::Create().ComputeHash([IO.File]::ReadAllBytes($msi.FullName))) -replace '-',''
          "sha256=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build bootstrapper (chains .NET Framework 4.7.2)
        run: |
          dotnet build ESG-SignalCreator.Bundle\ESG-SignalCreator.Bundle.wixproj -c Release `
            -p:ProductVersion=${{ steps.ver.outputs.version }} -p:MsiPath=${{ steps.msi.outputs.path }}

      - name: Locate bootstrapper
        id: exe
        run: |
          $exe = Get-ChildItem ESG-SignalCreator.Bundle\bin -Recurse -Filter *.exe |
                 Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $exe) { throw 'No setup .exe produced.' }
          "path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $sha = [BitConverter]::ToString([Security.Cryptography.SHA256]::Create().ComputeHash([IO.File]::ReadAllBytes($exe.FullName))) -replace '-',''
          "sha256=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ESG-SignalCreator ${{ steps.ver.outputs.tag }}
          prerelease: ${{ steps.ver.outputs.prerelease }}
          generate_release_notes: true
          files: |
            ${{ steps.exe.outputs.path }}
            ${{ steps.msi.outputs.path }}
          body: |
            Automated build of ESG-SignalCreator ${{ steps.ver.outputs.version }}.

            **Recommended — `ESG-SignalCreator-Setup-${{ steps.ver.outputs.version }}.exe`:** the bootstrapper.
            Installs **.NET Framework 4.7.2** automatically if it's missing (downloaded from Microsoft on demand),
            then the app. Per-machine x64. A VISA runtime is still needed for live instrument I/O.
            SHA256: `${{ steps.exe.outputs.sha256 }}`

            **`.msi`:** the raw package, for machines that already have .NET Framework 4.7.2.
            SHA256: `${{ steps.msi.outputs.sha256 }}`

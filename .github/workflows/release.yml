name: Release

# Builds the MSI and publishes a GitHub Release.
#
#  - push to main / manual run  -> a PRERELEASE tagged  v1.0.<run_number>.0  (every update -> a build)
#  - push a tag  v*             -> a STABLE release using that tag
#
# REQUIRES A SELF-HOSTED WINDOWS RUNNER. The Core project references the NI-488.2 + IVI/NI-VISA
# assemblies by absolute path into a local National Instruments / IVI Foundation install, which are
# NOT present on GitHub-hosted runners. Register a runner on a machine that has Visual Studio (MSBuild),
# the .NET SDK, and the VISA stack installed, with the labels:  self-hosted, windows
# (Settings -> Actions -> Runners -> New self-hosted runner). Once issue #102 makes VISA vendor-neutral
# via the freely-installable IVI shared components, a hosted runner may become viable.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version a.b.c.d (leave blank to auto-derive)'
        required: false

permissions:
  contents: write

jobs:
  build-release:
    runs-on: [ self-hosted, windows ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Determine version and tag
        id: ver
        shell: powershell
        run: |
          $input = "${{ github.event.inputs.version }}"
          $ref = "${{ github.ref }}"
          if (-not [string]::IsNullOrWhiteSpace($input)) {
            $version = $input
            $tag = "v$version"
            $prerelease = "false"
          }
          elseif ($ref -like 'refs/tags/v*') {
            $t = $ref -replace 'refs/tags/v',''
            $parts = @($t.Split('.'))
            while ($parts.Count -lt 4) { $parts += '0' }
            $version = ($parts[0..3] -join '.')
            $tag = "v$t"
            $prerelease = "false"
          }
          else {
            $version = "1.0.${{ github.run_number }}.0"
            $tag = "v$version"
            $prerelease = "true"
          }
          "version=$version"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag"             | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "version=$version tag=$tag prerelease=$prerelease"

      - name: Build solution (Release)
        shell: powershell
        run: msbuild ESG-SignalCreator.sln -t:Restore,Build -p:Configuration=Release -v:minimal -nologo

      - name: Run tests
        shell: powershell
        run: dotnet vstest ESG-SignalCreator.Tests\bin\Release\ESG-SignalCreator.Tests.dll

      - name: Build MSI (WiX v5)
        shell: powershell
        run: |
          $harvest = Join-Path $env:GITHUB_WORKSPACE 'ESG-SignalCreator.App\bin\Release'
          dotnet build ESG-SignalCreator.Installer\ESG-SignalCreator.Installer.wixproj -c Release `
            -p:ProductVersion=${{ steps.ver.outputs.version }} -p:HarvestPath=$harvest

      - name: Locate MSI
        id: msi
        shell: powershell
        run: |
          $msi = Get-ChildItem ESG-SignalCreator.Installer\bin -Recurse -Filter *.msi |
                 Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $msi) { throw 'No MSI produced.' }
          "path=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $sha = (Get-FileHash $msi.FullName -Algorithm SHA256).Hash
          "sha256=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ESG-SignalCreator ${{ steps.ver.outputs.tag }}
          prerelease: ${{ steps.ver.outputs.prerelease }}
          generate_release_notes: true
          files: ${{ steps.msi.outputs.path }}
          body: |
            Automated build of ESG-SignalCreator ${{ steps.ver.outputs.version }}.

            **Installer:** the `.msi` asset below (per-machine x64; requires .NET Framework 4.7.2 and a VISA runtime).
            **SHA256:** `${{ steps.msi.outputs.sha256 }}`
